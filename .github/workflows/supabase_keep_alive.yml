name: Supabase Keep Alive

on:
  schedule:
    - cron: '0 0 * * *' # Roda todos os dias à meia-noite UTC
  workflow_dispatch: # Permite rodar manualmente para testar

jobs:
  ping_supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Database
        run: |
          URL=$(echo "${{ secrets.SUPABASE_URL }}" | sed 's/"//g' | sed 's/\/$//')
          KEY=$(echo "${{ secrets.SUPABASE_KEY || secrets.SUPABASE_ANON_KEY }}" | sed 's/"//g')

          if [ -z "$URL" ] || [ -z "$KEY" ]; then
            echo "::error::SUPABASE_URL or SUPABASE_KEY/SUPABASE_ANON_KEY is missing."
            exit 1
          fi

          curl -sSfL -X GET "${URL}/rest/v1/leads?select=id&limit=1" \
          -H "apikey: ${KEY}" \
          -H "Authorization: Bearer ${KEY}"
